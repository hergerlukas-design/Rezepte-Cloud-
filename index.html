<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freundeskochbuch</title>
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" href="https://fav.farm/🍳">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #84a59d;    /* Salbeigrün */
            --bg: #faf9f6;         /* Off-White */
            --card: #F3EFE0;       /* Soft Clay */
            --text: #433e3a;       /* Anthrazit-Braun */
            --accent: #e07a5f;     /* Terrakotta */
        }

        body { font-family: -apple-system, system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        header { 
            background: var(--bg); padding: 45px 20px 20px 20px; 
            position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #e5dfcc; 
        }

        #searchBar { 
            width: 100%; padding: 14px; border: 1px solid #e5dfcc; border-radius: 12px; 
            font-size: 16px; box-sizing: border-box; outline: none; background: white;
        }

        .container { padding: 20px; padding-bottom: 120px; }
        
        /* Rezept Karten */
        details { background: var(--card); border-radius: 16px; margin-bottom: 15px; border: 1px solid #e5dfcc; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        summary { padding: 20px; font-weight: 600; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        summary::after { content: '❯'; font-size: 0.8em; color: #b5af9a; transition: 0.3s; }
        details[open] summary::after { transform: rotate(90deg); color: var(--primary); }

        .recipe-content { padding: 20px; border-top: 1px solid #e5dfcc; background: rgba(255,255,255,0.3); line-height: 1.6; }
        
        .ingredient-item { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }

        /* Floating Menu */
        .fab-container { position: fixed; bottom: 30px; right: 25px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 100; }
        .fab-sub { width: 50px; height: 50px; background: white; color: var(--text); border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 1px solid #e5dfcc; transition: 0.3s; border: none; cursor: pointer; }
        .fab-main { width: 65px; height: 65px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; border: none; box-shadow: 0 8px 20px rgba(132, 165, 157, 0.4); transition: 0.3s; cursor: pointer; }
        
        .fab-container.open .fab-sub { display: flex; animation: slideUp 0.3s ease-out; }
        .fab-container.open .fab-main { transform: rotate(45deg); background: var(--accent); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Overlays */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; display: none; overflow-y: auto; padding: 45px 20px; box-sizing: border-box; }
        input, textarea { width: 100%; margin-bottom: 15px; padding: 14px; border: 1px solid #e5dfcc; border-radius: 12px; font-size: 16px; box-sizing: border-box; outline: none; background: white; }
        .save-btn { background: var(--primary); color: white; width: 100%; padding: 16px; font-size: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; }
        .close-btn { background: none; border: none; color: var(--text); font-size: 16px; margin-bottom: 20px; cursor: pointer; display: block; margin-left: auto; font-weight: bold; }

        /* Buttons in Rezepten */
        .btn-group { display: flex; gap: 8px; margin-top: 20px; }
        .btn-group button { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #e5dfcc; font-weight: bold; cursor: pointer; background: white; color: var(--text); }
        .delete-btn-text { color: var(--accent) !important; border-color: #fee2e2 !important; background: #fff5f5 !important; }
    </style>
</head>
<body>

    <header>
        <h1>Unsere Rezepte 🍳</h1>
        <input type="text" id="searchBar" placeholder="Suchen..." onkeyup="filterRecipes()">
    </header>

    <div class="container" id="recipe-list">
        <p style="text-align:center; opacity:0.5; margin-top:40px;">Lade Rezepte aus der Cloud...</p>
    </div>

    <div class="fab-container" id="fabContainer">
        <button class="fab-sub" onclick="openOverlay('editor-overlay')" title="Neu schreiben">✍️</button>
        <button class="fab-sub" onclick="openOverlay('import-overlay')" title="Code einfügen">📥</button>
        <button class="fab-main" onclick="toggleFab()">+</button>
    </div>

    <div id="editor-overlay" class="overlay">
        <button class="close-btn" onclick="closeAllOverlays()">✕ Abbrechen</button>
        <h2 id="form-title">Neues Rezept</h2>
        <input type="hidden" id="edit-index">
        <input type="text" id="title" placeholder="Titel des Gerichts">
        <textarea id="ingredients" rows="6" placeholder="Zutaten (eine pro Zeile)"></textarea>
        <textarea id="instructions" rows="10" placeholder="Zubereitung..."></textarea>
        <button class="save-btn" onclick="saveRecipe()">In Cloud speichern</button>
    </div>

    <div id="import-overlay" class="overlay">
        <button class="close-btn" onclick="closeAllOverlays()">✕ Abbrechen</button>
        <h2>Rezept importieren</h2>
        <p>Füge den Code eines geteilten Rezepts hier ein:</p>
        <input type="text" id="importCode" placeholder="Code hier einfügen..." style="border-style: dashed;">
        <button class="save-btn" onclick="importRecipe()">Hinzufügen</button>
    </div>

    <script>
        // --- SUPABASE KONFIGURATION ---
        // BITTE HIER DEINE DATEN EINTRAGEN:
        const SUPABASE_URL = 'https://jtswqnsasjngicnrmhxg.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp0c3dxbnNhc2puZ2ljbnJtaHhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODk0MTcsImV4cCI6MjA4NzM2NTQxN30.PeYrBhTpiVmpmnMY-Y7x7FPt6DY_XsCa6r-AtugcJe8';
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let recipes = [];

        // 1. REZEPTE RENDERN
        async function renderRecipes() {
            const { data, error } = await supabaseClient
                .from('rezepte')
                .select('*')
                .order('title', { ascending: true });

            if (error) {
                console.error("Fehler:", error);
                document.getElementById('recipe-list').innerHTML = "<p style='text-align:center; color:red;'>Verbindung fehlgeschlagen.</p>";
                return;
            }

            recipes = data;
            const list = document.getElementById('recipe-list');
            list.innerHTML = recipes.length ? "" : "<p style='text-align:center; opacity:0.5; margin-top:40px;'>Noch keine Rezepte in der Cloud.</p>";
            
            recipes.forEach((r, i) => {
                const ings = r.ingredients.split('\n').filter(t => t.trim()).map(t => 
                    `<div class="ingredient-item"><input type="checkbox"> <span>${t}</span></div>`
                ).join('');

                list.innerHTML += `
                    <details class="recipe-item">
                        <summary>${r.title}</summary>
                        <div class="recipe-content">
                            <strong>Zutaten:</strong><br>${ings}
                            <hr style="border:0; border-top:1px solid #e5dfcc; margin:15px 0;">
                            <strong>Zubereitung:</strong><p>${r.instructions.replace(/\n/g, '<br>')}</p>
                            <div class="btn-group">
                                <button onclick="openEdit(${i})">Bearbeiten</button>
                                <button onclick="shareRecipe(${i})">Teilen</button>
                                <button class="delete-btn-text" onclick="deleteRecipe(${r.id})">Löschen</button>
                            </div>
                        </div>
                    </details>`;
            });
        }

        // 2. SPEICHERN
        async function saveRecipe() {
            const title = document.getElementById('title').value;
            const ingredients = document.getElementById('ingredients').value;
            const instructions = document.getElementById('instructions').value;
            const editId = document.getElementById('edit-index').value;

            if (!title) return alert("Bitte Titel eingeben!");

            const recipeData = { title, ingredients, instructions };

            if (editId === "") {
                await supabaseClient.from('rezepte').insert([recipeData]);
            } else {
                await supabaseClient.from('rezepte').update(recipeData).eq('id', editId);
            }

            closeAllOverlays();
            renderRecipes();
        }

        // 3. TEILEN (Erzeugt weiterhin einen Code für Freunde)
        function shareRecipe(index) {
            const code = btoa(unescape(encodeURIComponent(JSON.stringify(recipes[index]))));
            navigator.clipboard.writeText(code).then(() => alert("Rezept-Code kopiert!"));
        }

        // 4. IMPORTIEREN
        async function importRecipe() {
            const code = document.getElementById('importCode').value.trim();
            try {
                const decoded = JSON.parse(decodeURIComponent(escape(atob(code))));
                delete decoded.id; // Alte ID entfernen, damit Supabase eine neue vergibt
                await supabaseClient.from('rezepte').insert([decoded]);
                document.getElementById('importCode').value = "";
                closeAllOverlays();
                renderRecipes();
            } catch (e) { alert("Code ungültig"); }
        }

        // 5. HELFER-FUNKTIONEN
        function toggleFab() { document.getElementById('fabContainer').classList.toggle('open'); }
        
        function openOverlay(id) {
            closeAllOverlays();
            document.getElementById(id).style.display = 'block';
            if(id !== 'editor-overlay') toggleFab(); 
        }

        function closeAllOverlays() {
            document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none');
            document.getElementById('edit-index').value = "";
            document.getElementById('form-title').innerText = "Neues Rezept";
            if(document.getElementById('fabContainer').classList.contains('open')) toggleFab();
        }

        function openEdit(i) {
            const r = recipes[i];
            document.getElementById('title').value = r.title;
            document.getElementById('ingredients').value = r.ingredients;
            document.getElementById('instructions').value = r.instructions;
            document.getElementById('edit-index').value = r.id;
            document.getElementById('form-title').innerText = "Rezept bearbeiten";
            document.getElementById('editor-overlay').style.display = 'block';
        }

        async function deleteRecipe(id) {
            if(confirm("Rezept endgültig aus der Cloud löschen?")) {
                await supabaseClient.from('rezepte').delete().eq('id', id);
                renderRecipes();
            }
        }

        function filterRecipes() {
            const term = document.getElementById('searchBar').value.toLowerCase();
            document.querySelectorAll('.recipe-item').forEach(d => {
                d.style.display = d.querySelector('summary').innerText.toLowerCase().includes(term) ? "block" : "none";
            });
        }

        // Start
        renderRecipes();
    </script>
</body>
</html>
